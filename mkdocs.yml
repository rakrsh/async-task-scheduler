site_name: Async Task Scheduler
site_description: High-performance C++20 Asynchronous Task Scheduler with Work-Stealing and Coroutines.
site_author: Antigravity AI
site_url: https://your-domain.com/async-task-scheduler

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - User Guide: user-guide.md
  - API Reference:
      - Overview: api/index.md
      - scheduler::Scheduler: api/scheduler_scheduler.md
      - scheduler::Task: api/scheduler_task.md
      - scheduler::Task::promise_type: api/scheduler_task_promise_type.md
      - scheduler::Worker: api/scheduler_worker.md
      - scheduler::WorkStealingDeque: api/scheduler_workstealingdeque.md
  - AI & Agents:
      - Agent Manual: agent-manual.md
      - Copilot Instructions: copilot.md
  - Architecture: architecture.md
